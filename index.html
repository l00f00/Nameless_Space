<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlayCanvas - Sequential Rooms</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: Inter, system-ui, sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      .hud {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        color: #fff;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 14px;
      }

      .btn {
        margin-top: 8px;
        width: 100%;
        cursor: pointer;
        background: #c61111;
        color: #fff;
        border: 0;
        border-radius: 6px;
        padding: 7px 10px;
      }

      .touch-zone {
        position: fixed;
        bottom: 0;
        width: 50vw;
        height: 42vh;
        z-index: 10;
        touch-action: none;
      }

      #move-zone {
        left: 0;
      }

      #look-zone {
        right: 0;
      }

      .touch-zone::after {
        content: "";
        position: absolute;
        inset: 20px;
        border: 1px dashed rgba(255, 255, 255, 0.13);
        border-radius: 12px;
      }

      @media (pointer: fine) {
        .touch-zone {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div class="hud">
      <div>WASD / Touch per muoversi</div>
      <div>Mouse / Touch dx per camera</div>
      <button id="xr-btn" class="btn">Enter WebXR (VR)</button>
    </div>
    <div id="move-zone" class="touch-zone"></div>
    <div id="look-zone" class="touch-zone"></div>

    <script src="https://code.playcanvas.com/playcanvas-stable.min.js"></script>
    <script type="module" src="./scripts/main.js"></script>
  </body>
</html>
